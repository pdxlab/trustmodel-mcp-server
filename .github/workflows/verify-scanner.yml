name: verify-scanner

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to the package floor. The guarded launcher and install check
      # enforce the same version for consumers (TRUS-1415).
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Install dependencies
        run: npm ci

      - name: Build + run scanner acceptance script
        run: npm run verify:scanner
