name: verify-discovery

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to the package floor. The guarded launcher and install check
      # enforce the same version for consumers (TRUS-1415).
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Install dependencies
        run: npm ci

      # Both Shadow Discovery acceptance scripts. fingerprint stubs fetch,
      # scan-paths uses temp fixtures — neither hits the network.
      - name: Verify shadow-discovery scan-paths
        run: npm run verify:discovery

      - name: Verify API-key fingerprint scan
        run: npm run verify:fingerprint
