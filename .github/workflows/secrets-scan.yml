name: secrets-scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan PR commits
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --log-opts="--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Scan latest push
        if: github.event_name == 'push'
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --log-opts="-1 HEAD"
